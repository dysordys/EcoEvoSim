name: CI

on:
  push:
    branches:
      - main
    tags: ['*']
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref (e.g. successive pushes to a PR).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }} - ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        version:
          # 1.10 is the project's minimum (the LTS line). We pin to the 1.10 line's
          # latest patch rather than using 'min', because Julia 1.10.0's Pkg has a
          # status-printing bug (KeyError: SparseArrays) that breaks `Pkg.test` for
          # dependency trees with stdlib extensions — unrelated to this package, and
          # fixed in later 1.10 patches.
          - '1.10'  # minimum supported Julia (LTS), latest patch
          - '1'     # latest stable 1.x
        os:
          - ubuntu-latest
        arch:
          - x64
        include:
          # Spot-check the other platforms on the latest stable release.
          - os: macos-latest
            version: '1'
            arch: aarch64
          - os: windows-latest
            version: '1'
            arch: x64
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}
      - uses: julia-actions/cache@v2
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1
