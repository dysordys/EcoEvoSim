name: Documentation

on:
  push:
    branches:
      - main
    tags: ['*']
  pull_request:
  workflow_dispatch:

# Needed for Documenter to push the built site to the gh-pages branch and to post
# documentation previews on pull requests.
permissions:
  actions: write
  contents: write
  pull-requests: read
  statuses: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1'
      - uses: julia-actions/cache@v2
      - name: Install documentation dependencies
        run: julia --project=docs/ -e 'using Pkg; Pkg.develop(PackageSpec(path=pwd())); Pkg.instantiate()'
      - name: Build and deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}       # for authentication / PR previews
          DOCUMENTER_KEY: ${{ secrets.DOCUMENTER_KEY }}   # SSH deploy key (optional but recommended)
        run: julia --project=docs/ docs/make.jl
